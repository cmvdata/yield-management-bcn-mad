name: Daily BCN-MAD Scrape

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC (09:00 Madrid)
    - cron: '0 17 * * *'  # 17:00 UTC (19:00 Madrid)
  workflow_dispatch:       # permitir trigger manual

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run scraper
        run: python scripts/scrape_bcn_mad.py
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ logs/
          git diff --staged --quiet || git commit -m "Daily scrape $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
